<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Americano</title>
<style>
body{
    font-family:-apple-system,sans-serif;
    background:#f2f2f7;
    padding:15px;
    margin:0;
}
.card{
    background:white;
    border-radius:15px;
    padding:20px;
    margin-bottom:15px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
h1,h2,h3{
    margin-top:0;
}
input,select,button{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:12px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
    box-sizing:border-box;
}
button{
    background:#007AFF;
    color:white;
    border:none;
    font-weight:bold;
}
.match{
    background:#f7f7f7;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}
.bye{
    color:#666;
    margin-top:10px;
}
</style>
</head>
<body>
<div class="card">
<h1>Padel Americano</h1>
<label>Event Date</label>
<input type="date" id="eventDate">
<label>Number of Players</label>
<select id="playerCount" onchange="buildPlayers()">
<option>8</option>
<option>9</option>
<option>10</option>
<option>11</option>
<option>12</option>
<option>13</option>
<option>14</option>
<option>15</option>
<option>16</option>
<option>17</option>
<option>18</option>
<option>19</option>
<option>20</option>
</select>
<div id="playerInputs"></div>
<button onclick="generateTournament()">
Generate Tournament
</button>
</div>
<div id="schedule"></div>
<script>
function buildPlayers(){
    let count =
    parseInt(
    document.getElementById("playerCount").value
    );
    let html = "";
    for(let i=1;i<=count;i++){
        html += `
        <input
        class="player"
        placeholder="Player ${i}">
        `;
    }
    document.getElementById("playerInputs")
    .innerHTML = html;
}
buildPlayers();
function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        let j =
        Math.floor(Math.random()*(i+1));
        [array[i],array[j]] =
        [array[j],array[i]];
    }
    return array;
}
function generateTournament(){
    let players =
    [...document.querySelectorAll(".player")]
    .map(x=>x.value.trim())
    .filter(x=>x !== "");
    if(players.length < 8){
        alert("Please enter at least 8 players");
        return;
    }
    let rounds = players.length - 1;
    let html = `
    <div class="card">
    <h2>Tournament Schedule</h2>
    <p><b>Total Rounds:</b> ${rounds}</p>
    `;
    for(let round=1; round<=rounds; round++){
        let shuffled =
        shuffle([...players]);
        let active =
        shuffled.slice(0,8);
        let byes =
        shuffled.slice(8);
        html += `
        <div class="card">
        <h3>Round ${round}</h3>
        <div class="match">
        <b>Court 1</b><br><br>
        ${active[0]} & ${active[1]}
        <br>vs<br>
        ${active[2]} & ${active[3]}
        </div>
        <div class="match">
        <b>Court 2</b><br><br>
        ${active[4]} & ${active[5]}
        <br>vs<br>
        ${active[6]} & ${active[7]}
        </div>
        `;
        if(byes.length){
            html += `
            <div class="bye">
            <b>Bye:</b>
            ${byes.join(", ")}
            </div>
            `;
        }
        html += `</div>`;
    }
    html += `</div>`;
    document.getElementById("schedule")
    .innerHTML = html;
}
</script>
</body>
</html>
